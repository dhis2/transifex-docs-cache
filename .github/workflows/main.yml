name: Transifex Cache Updater

on:
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron:  '11 21 * * *'
  workflow_dispatch:

jobs:
  transifex:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.8
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install https://github.com/Philip-Larsen-Donnelly/translayer/archive/refs/heads/main.zip
          pip install requests
  
      - name: Run the script
        run: python3 tools/update_cache.py
        shell: bash
        env:
          TX_TOKEN: ${{ secrets.TRANSIFEX_DOCS_CACHE_TOKEN }}
  
      - uses: dhis2/action-commit-signing@v1
        with:
          ssh-signing-key: ${{ secrets.DHIS2_BOT_SSH_SIGNING_KEY }}
          ssh-signing-key-passphrase: ${{ secrets.DHIS2_BOT_SSH_SIGNING_PASSPHRASE }}
        
      - name: Commit & Push changes
        run: |
          git add projects/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: autopublish $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin main
        shell: bash
